interface:
  display_name: "Tidy Folder"
  short_description: "Agent-led folder reorganization using helper evidence, reviewed manifests, and gate-approved execution"
  default_prompt: "Use $Tidy Folder with an agent-led manifest flow: create a lightweight initial snapshot and active run lock, use helper scripts only to gather evidence and draft artifacts, apply explicit evidence-precedence rules, have Gatekeeper independently challenge representative raw evidence, and execute only supervisor-approved, gate-cleared moves while preserving project internals and routing cleanup into snapshot trash." 
