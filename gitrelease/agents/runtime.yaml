version: 1

controller:
  execution: "inherit"
  responsibilities:
    - "Own user communication, live-worktree verification, and final reporting."
    - "Use workers for bounded planning or execution only when the host can satisfy each step's workspace requirement."
    - "Do not allow a worker to guess missing release inputs."

steps:
  - id: "release-preflight"
    agent_type: "worker"
    use_subagent_when_available: true
    workspace: "fork-safe"
    model: "gpt-5.3-codex-spark"
    reasoning_effort: "low"
    scope: "Resolve the default branch, inspect open PRs, confirm worktree cleanliness, identify the release validation command, and find the latest version tag."
    controller_handoff: "Verify blocking facts in the live worktree before continuing to release side effects."

  - id: "release-versioning"
    agent_type: "worker"
    use_subagent_when_available: true
    workspace: "fork-safe"
    model: "gpt-5.4-mini"
    reasoning_effort: "medium"
    scope: "Choose the next semver version and explain the bump rationale from validated repository facts."
    controller_handoff: "Pass validated facts only and keep the controller responsible for accepting or rejecting the proposed version."

  - id: "release-execution"
    agent_type: "worker"
    use_subagent_when_available: true
    workspace: "same-worktree"
    model: "gpt-5.3-codex-spark"
    reasoning_effort: "medium"
    scope: "Generate release notes with gix, update CHANGELOG.md, create the release commit, push it, and run gix release."
    controller_handoff: "If the host cannot guarantee same-worktree execution, run this step inline in the controller after the version is settled."
